<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portal oficial de la Junta Administradora Local (JAL) de la Comuna 3 Manrique, Medellín. Noticias, eventos, trámites y contacto." />
  <meta name="keywords" content="JAL, Junta Administradora Local, Comuna 3, Manrique, Medellín, trámites, noticias, eventos" />
  <meta name="author" content="JAL Comuna 3 Manrique" />
  <meta property="og:title" content="JAL Comuna 3 Manrique — Medellín" />
  <meta property="og:description" content="Portal oficial de la Junta Administradora Local de la Comuna 3 de Medellín." />
  <meta property="og:type" content="website" />
  <title>JAL Comuna 3 Manrique — Medellín</title>

  <!-- Google Fonts: Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Bootstrap 5 CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/main.css" />

  <!-- Favicon inline SVG -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>" />
</head>
<body>

  <!-- ─── Navbar dinámica (inyectada por Navbar.js) ─── -->
  <header id="app-navbar"></header>

  <!-- ─── Toast container (Toast.js) ─── -->
  <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;" aria-live="polite" aria-atomic="true"></div>

  <!-- ─── Pantalla de carga inicial ─── -->
  <div id="loading-screen" class="loading-screen d-flex flex-column align-items-center justify-content-center">
    <div class="spinner-border text-primary" role="status" style="width:3rem;height:3rem;">
      <span class="visually-hidden">Cargando…</span>
    </div>
    <p class="mt-3 text-muted fw-medium">Iniciando JAL Manrique…</p>
  </div>

  <!-- ─── Contenedor principal de la SPA ─── -->
  <main id="app-root" class="d-none"></main>

  <!-- ─── Footer ─── -->
  <footer id="app-footer" class="footer-main d-none">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6 text-center text-md-start">
          <p class="mb-0 fw-medium">© 2025 JAL Comuna 3 Manrique — Medellín</p>
          <p class="mb-0 text-muted small">Todos los derechos reservados</p>
        </div>
        <div class="col-md-6 text-center text-md-end mt-2 mt-md-0">
          <span class="badge bg-primary-subtle text-primary-emphasis me-1">
            <i class="bi bi-shield-check"></i> Portal Oficial
          </span>
          <span class="badge bg-success-subtle text-success-emphasis">
            <i class="bi bi-geo-alt"></i> Medellín, Colombia
          </span>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap 5 JS Bundle (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

  <!-- Google Identity Services (GIS) para Auth de Google / Drive API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <!-- ─── Google API Client (gapi) para Google Drive API v3 ─── -->
  <script src="https://apis.google.com/js/api.js" async defer></script>

  <!-- PizZip (necesario para docxtemplater) -->
  <script src="js/vendor/pizzip.min.js"></script>

  <!-- docxtemplater -->
  <script src="js/vendor/docxtemplater.js"></script>

  <!-- ─── Punto de entrada de la SPA (type="module" habilita ES6 imports) ─── -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
